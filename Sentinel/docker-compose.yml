version: '3.8'

services:
  sentinel-web:
    image: ${DOCKERHUB_USERNAME}/sentinel:${VERSION_TAG:-latest}
    container_name: sentinel-app
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      # Connection string (use secrets or environment variables)
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      # Geocoding configuration
      - Geocoding__Provider=${GEOCODING_PROVIDER:-google}
      - Geocoding__ApiKey=${GEOCODING_API_KEY}
      - Geocoding__Email=${GEOCODING_EMAIL}
      - Geocoding__DefaultCountry=${GEOCODING_DEFAULT_COUNTRY:-AU}
    restart: unless-stopped
    depends_on:
      - sentinel-db
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  sentinel-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sentinel-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_PASSWORD:-YourStrong!Password123}
      - MSSQL_PID=Developer
    volumes:
      - sentinel-db-data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - sentinel-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SQL_PASSWORD:-YourStrong!Password123} -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

volumes:
  sentinel-db-data:
    driver: local

networks:
  sentinel-network:
    driver: bridge
